    <style>
  @keyframes embed-spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  #loading-overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #FAF6F0 0%, #F5E6CA 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    transition: opacity 0.4s ease, visibility 0.4s;
  }

  .loading-spinner {
    width: 44px;
    height: 44px;
    border: 4px solid #FAF6F0;
    border-top: 4px solid #FF7F50;
    border-radius: 50%;
    animation: embed-spin 0.8s linear infinite;
    margin-bottom: 16px;
  }

  #app-iframe {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">

<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 700; color: #0F766E;">DASHBOARD PROGRES SE2026</div>
  <div style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 11px; font-weight: 600; color: #7c6d5c; margin-top: 6px;">BPS Kabupaten Kepahiang</div>
</div>

<iframe
  id="app-iframe"
  src="https://script.google.com/macros/s/AKfycbygPIEfgEnG89D4q-XgAt2FVJxjvkDVDmK2fn9NhbILkLuhcA8hP2yXISnF3zLsLK9N8A/exec"
  allow="geolocation; microphone; camera"
></iframe>

<script>
  (function () {
    var iframe = document.getElementById('app-iframe');
    var overlay = document.getElementById('loading-overlay');
    var fallback = setTimeout(removeOverlay, 12000);

    iframe.onload = function () {
      clearTimeout(fallback);
      removeOverlay();
    };

    function removeOverlay() {
      if (overlay) {
        overlay.style.opacity = '0';
        overlay.style.visibility = 'hidden';
        setTimeout(function () {
          if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
        }, 400);
      }
    }
  })();
</script>
